services:
  - type: web
    name: forge-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      # Public URL of this Render service (no trailing slash). Used for OAuth redirects.
      - key: FORGE_PUBLIC_BASE_URL
        sync: false
      # Site origin for the SPA (e.g. same as FORGE_PUBLIC_BASE_URL or your Vercel UI).
      - key: FORGE_FRONTEND_BASE_URL
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      # Must match the secret_token passed to Telegram setWebhook (see scripts/set_telegram_webhook.py).
      - key: WEBHOOK_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: FORGE_CORS_ALLOWED_ORIGINS
        sync: false
